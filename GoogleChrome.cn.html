<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        /* 2009年经典的衬线字体与字号风格 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            font-size: 13px;
            color: #000;
            background-color: #fff;
            position: relative;
            min-height: 100vh;
        }

        /* 顶部栏（左侧导航 + 右侧登录） */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 10px 4px 10px;
        }
        .top-nav b {
            color: #000;
            margin-right: 15px;
        }
        .top-nav a {
            color: #0000cc;
            text-decoration: underline;
            margin-right: 15px;
        }
        .right-auth a {
            color: #0000cc;
            text-decoration: underline;
            font-weight: bold;
            cursor: pointer;
        }

        /* 主体内容居中 */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 70px;
        }

        /* 经典谷歌中国Logo */
        .logo-box {
            position: relative;
            margin-bottom: 25px;
            user-select: none;
        }
        .main-logo {
            font-family: 'Times New Roman', Times, serif;
            font-size: 85px;
            font-weight: bold;
            letter-spacing: -3px;
        }
        .g1 { color: #1f4cb4; }
        .o1 { color: #e11e24; }
        .o2 { color: #fbc200; }
        .g2 { color: #1f4cb4; }
        .l  { color: #009933; }
        .e  { color: #e11e24; }
        
        .zh-tag {
            position: absolute;
            bottom: 12px;
            right: -55px;
            font-family: "SimSun", "宋体", serif;
            font-size: 26px;
            color: #222;
            font-weight: normal;
        }

        /* 搜索表单区域 */
        .search-form {
            width: 100%;
            max-width: 512px;
            text-align: center;
        }
        .search-input {
            width: 96%;
            padding: 4px 5px;
            font-size: 16px;
            border: 1px solid #7f9db9;
            margin-bottom: 15px;
            outline: none;
        }

        /* 经典按钮 */
        .btn-container {
            margin-bottom: 30px;
        }
        .google-btn {
            background-color: #f5f5f5;
            border: 1px solid #b5b5b5;
            color: #000;
            font-size: 13px;
            padding: 3px 12px;
            margin: 0 4px;
            cursor: pointer;
            border-radius: 2px;
        }

        .sub-links {
            font-size: 13px;
            margin-bottom: 80px;
        }
        .sub-links a { color: #0000cc; text-decoration: underline; }

        /* 底部栏 */
        .footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 12px;
            color: #666;
            line-height: 22px;
        }
        .footer a { color: #0000cc; text-decoration: underline; margin: 0 8px; }

        /* ================= 仿谷歌弹窗登录/注册界面 ================= */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .google-box {
            background: #fff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 35px;
            width: 360px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 20px; color: #aaa; cursor: pointer;
        }
        .box-title {
            font-family: sans-serif;
            font-size: 24px; color: #202124;
            margin-bottom: 25px; text-align: center;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .input-group label {
            display: block; font-size: 13px; color: #202124; margin-bottom: 5px;
        }
        .google-input {
            width: 100%; padding: 8px 10px; font-size: 14px;
            border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box;
            outline: none;
        }
        .google-input:focus { border-color: #1a73e8; }
        
        /* 验证码区域 */
        .captcha-box {
            background: #f1f3f4;
            padding: 8px; border-radius: 4px;
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px;
        }
        .captcha-text {
            font-size: 16px; font-weight: bold; color: #3c4043; letter-spacing: 2px;
        }
        .captcha-input {
            width: 80px; padding: 6px; font-size: 14px; text-align: center; border: 1px solid #dadce0; border-radius: 4px;
        }

        .submit-btn {
            background-color: #1a73e8; color: white; border: none;
            padding: 10px; border-radius: 4px; font-size: 14px;
            cursor: pointer; width: 100%; font-weight: bold;
        }
        .submit-btn:hover { background-color: #1557b0; }
        .switch-type {
            text-align: center; margin-top: 15px; font-size: 13px; color: #1a73e8; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header-bar">
        <div class="top-nav">
            <b>网页</b>
            <a href="javascript:void(0);" onclick="alert('暂不支持图片搜索')">图片</a>
            <a href="javascript:void(0);" onclick="alert('暂不支持视频搜索')">视频</a>
            <a href="javascript:void(0);" onclick="alert('暂不支持地图搜索')">地图</a>
            <a href="javascript:void(0);" onclick="alert('更多趣味功能正在开发中...')">更多 »</a>
        </div>
        <div class="right-auth">
            <a onclick="openAuthModal('login')">登录/注册</a>
        </div>
    </div>

    <div class="container">
        <div class="logo-box">
            <span class="main-logo">
                <span class="g1">G</span><span class="o1">o</span><span class="o2">o</span><span class="g2">g</span><span class="l">l</span><span class="e">e</span>
            </span>
            <span class="zh-tag">谷歌</span>
        </div>

        <div class="search-form">
            <form action="https://www.startpage.com/do/search" method="get" target="_blank">
                <input type="text" name="query" class="search-input" autofocus autocomplete="off"><br>
                <div class="btn-container">
                    <button type="submit" class="google-btn">Google 搜索</button>
                    <button type="button" class="google-btn" onclick="window.open('https://foreverblog.cn/go.html', '_blank')">手气不错</button>
                </div>
            </form>
        </div>

        <div class="sub-links">
            <span>把 Google 设为首页！</span>
        </div>
    </div>

    <div class="footer">
        <div><a href="javascript:void(0);">Google 大全</a> - <a href="javascript:void(0);">Google.com in English</a></div>
        <div>©2009 Google - <a href="javascript:void(0);">隐私权政策</a> - <a href="javascript:void(0);">条款</a></div>
        <div style="font-size: 11px; color: #888;">京ICP证060001号 京公网安备110000000001号</div>
    </div>


    <div class="modal-overlay" id="authModal">
        <div class="google-box">
            <span class="close-btn" onclick="closeAuthModal()">×</span>
            <div class="box-title" id="modalTitle">登录您的 Google 账号</div>
            
            <form id="authForm" onsubmit="handleAuthSubmit(event)">
                <input type="hidden" id="authType" value="login">

                <div class="input-group">
                    <label>电子邮箱或用户名</label>
                    <input type="text" id="username" class="google-input" required autocomplete="off">
                </div>

                <div class="input-group">
                    <label>输入密码</label>
                    <input type="password" id="password" class="google-input" required>
                </div>

                <div class="input-group" id="confirmPasswordGroup" style="display: none;">
                    <label>再次输入密码确认</label>
                    <input type="password" id="confirmPassword" class="google-input">
                </div>

                <div class="input-group">
                    <label>人机身份验证（请输入计算结果）</label>
                    <div class="captcha-box">
                        <span class="captcha-text" id="captchaQuestion">5 + 7 = </span>
                        <input type="number" id="captchaAnswer" class="captcha-input" required autocomplete="off">
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">登录</button>
                <div class="switch-type" id="switchLink" onclick="toggleAuthType()">还没有账号？立即创建账户</div>
            </form>
        </div>
    </div>

    <script>
        let num1 = 0;
        let num2 = 0;
        let correctAnswer = 0;

        // 生成随机数学题
        function generateCaptcha() {
            num1 = Math.floor(Math.random() * 10) + 1; // 1-10随机数
            num2 = Math.floor(Math.random() * 10) + 1; 
            correctAnswer = num1 + num2;
            document.getElementById('captchaQuestion').innerText = `${num1} + ${num2} = `;
            document.getElementById('captchaAnswer').value = ''; // 清空上一轮输入的答案
        }

        // 打开弹窗
        function openAuthModal(type) {
            document.getElementById('authModal').style.display = 'flex';
            setAuthType(type);
        }

        // 关闭弹窗
        function closeAuthModal() {
            document.getElementById('authModal').style.display = 'none';
        }

        // 切换登录/注册状态
        function toggleAuthType() {
            const currentType = document.getElementById('authType').value;
            setAuthType(currentType === 'login' ? 'register' : 'login');
        }

        function setAuthType(type) {
            document.getElementById('authType').value = type;
            generateCaptcha(); // 每次切换或打开都刷新验证码

            if (type === 'login') {
                document.getElementById('modalTitle').innerText = '登录您的 Google 账号';
                document.getElementById('confirmPasswordGroup').style.display = 'none';
                document.getElementById('confirmPassword').removeAttribute('required');
                document.getElementById('submitBtn').innerText = '登录';
                document.getElementById('switchLink').innerText = '还没有账号？立即创建账户';
            } else {
                document.getElementById('modalTitle').innerText = '创建您的 Google 账号(并非gmail.com邮箱)';
                document.getElementById('confirmPasswordGroup').style.display = 'block';
                document.getElementById('confirmPassword').setAttribute('required', 'required');
                document.getElementById('submitBtn').innerText = '立即注册';
                document.getElementById('switchLink').innerText = '已有账号？直接登录';
            }
        }

        // 提交表单处理
        function handleAuthSubmit(event) {
            event.preventDefault();
            
            const type = document.getElementById('authType').value;
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            const userCaptcha = parseInt(document.getElementById('captchaAnswer').value);

            // 1. 优先校验人机验证
            if (userCaptcha !== correctAnswer) {
                alert('❌ 人机验证计算错误！请重新计算。');
                generateCaptcha(); // 刷新题目
                return;
            }

            // 2. 如果是注册，校验两次密码
            if (type === 'register' && pass !== confirmPass) {
                alert('❌ 两次输入的密码不一致，请重新输入！');
                return;
            }

            // 3. 模拟通过后的操作
            if (type === 'login') {
                alert(`🎉 登录成功！欢迎回来，${user}！`);
            } else {
                alert(`🎉 注册成功！您的账号 ${user} 已创建。`);
            }
            
            closeAuthModal();
        }
    </script>
</body>
</html>
